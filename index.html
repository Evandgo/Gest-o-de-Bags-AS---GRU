<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Gestão Bags AS</title>
  <link rel="stylesheet" href="styles.css?v=1">
</head>

<body>

<!-- ================= LOGIN ================= -->
<div id="loginContainer" class="login-bg">

  <!-- LADO ESQUERDO (TEXTO) -->
  <div class="login-left">
    <img src="latam.png" class="logo-latam">

    <h1>Conectando pessoas,<br>entregando excelência.</h1>

    <p>
      Sistema de gestão de bagagens e<br>
      operações aeroportuárias.
    </p>

    <div class="logos-bottom">
      <img src="GRU.png">
      <img src="wfs.png">
    </div>
  </div>

  <!-- CARD LOGIN -->
  <div class="login-wrapper">

    <div class="login-card">

      <div class="login-icon">
        <img src="circulo.png">
      </div>

      <h2>Acesso ao Sistema</h2>
      <p class="subtitle">Informe suas credenciais para continuar</p>

      <div class="input-group">
        <img src="avatar.png">
        <input type="text" id="username" placeholder="Login">
      </div>

      <div class="input-group">
        <img src="cadeado.png">
        <input type="password" id="password" placeholder="Senha">
      </div>

      <button onclick="login()">Entrar →</button>

      <div class="divider">ou</div>

      <p class="support">
        Precisa de ajuda? <span>Fale com o suporte</span>
      </p>

      <div class="footer-login">
        <p>Desenvolvido por Diego Pereira da Silva</p>
        <p>Analista Sênior de Projetos</p>
      </div>

      <p id="error"></p>

    </div>

  </div>

</div>

<script src="script.js?v=1"></script>

</body>
</html>
